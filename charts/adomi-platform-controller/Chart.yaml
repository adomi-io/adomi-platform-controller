apiVersion: v2
name: adomi-platform-controller
description: |
  The Kubernetes control plane for the Adomi platform: manages SSO applications
  (Authentik, OpenBao, External Secrets) and the Odoo resource model
  (Organization, Client, Workspace, Application) deployed via Argo CD and
  CloudNativePG. Drops into the kubernetes-provisioner platform.
type: application
version: 0.5.4
appVersion: "0.5.4"
keywords:
  - sso
  - authentik
  - openbao
  - external-secrets
  - odoo
  - argocd
  - cloudnative-pg
  - argo-workflows
  - argo-events
  - harbor
  - preview-environments
home: https://github.com/adomi-io/adomi-platform-controller
sources:
  - https://github.com/adomi-io/adomi-platform-controller
maintainers:
  - name: Adomi Software
