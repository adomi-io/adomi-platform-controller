# Default values for adomi-platform-controller.

# The operator runs standalone (Kopf, no peering), so a single replica owns
# reconciliation. Do not raise above 1 unless you enable Kopf peering.
replicaCount: 1

image:
  repository: ghcr.io/adomi-io/adomi-platform-controller
  # tag defaults to the chart appVersion when empty.
  tag: ""
  # The appVersion tag is MUTABLE (CI republishes it every merge), so the
  # policy must be Always — IfNotPresent pins pods to whatever the node cached
  # first and rollout restarts silently keep running old code. Pin tag to an
  # immutable digest/SHA before switching this back.
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Created by the chart. The name is fixed (not release-prefixed) so it matches
  # the OpenBao kubernetes-auth role that binds this ServiceAccount. Keep it in
  # sync with backend.openbao.kubernetes.authRole's bound_service_account_names.
  create: true
  name: adomi-platform-controller
  annotations: {}

resources:
  requests:
    cpu: 20m
    memory: 128Mi
  limits:
    # Cluster-wide kopf observes every CRD + namespace at startup on top of the
    # Python/aiohttp baseline; 256Mi OOMKills during initial listing. 512Mi
    # leaves comfortable headroom.
    memory: 512Mi

# Extra environment variables for the controller container (advanced).
extraEnv: []

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Backend wiring. Defaults match the kubernetes-provisioner conventions so the
# controller drops into an existing OpenBao / Authentik / External Secrets setup.
backend:
  openbao:
    address: http://openbao.openbao.svc.cluster.local:8200
    kvMount: secret
    # How the controller authenticates to OpenBao:
    #   "kubernetes" (recommended) logs in with this controller's ServiceAccount
    #     via OpenBao's kubernetes auth. No static token is stored anywhere.
    #     Requires an OpenBao role + write policy (created by openbao-bootstrap).
    #   "token" reads a static token from a Secret (the openbao-keys root-token
    #     by default). Simple, but the root token is broad; prefer kubernetes.
    authMode: kubernetes
    kubernetes:
      authMount: kubernetes
      authRole: adomi-platform-controller
    token:
      secretNamespace: openbao
      secretName: openbao-keys
      secretKey: root-token

  authentik:
    address: http://authentik-server.authentik.svc.cluster.local
    # OpenBao KV path + key holding the Authentik API (bootstrap) token.
    secretPath: authentik
    tokenKey: bootstrap-token
    authorizationFlowSlug: default-provider-authorization-implicit-consent
    invalidationFlowSlug: default-provider-invalidation-flow
    signingKeyName: "authentik Self-signed Certificate"

  externalSecrets:
    # ClusterSecretStore used to deliver credentials into app namespaces.
    clusterSecretStore: openbao

# Platform wiring for the Application engine. It provisions supporting
# resources, then creates an Argo CD Application per app from the catalog chart.
platform:
  argocd:
    # Namespace Argo CD runs in (where Application objects are created).
    namespace: argocd
    # AppProject the generated Applications are placed in.
    project: default
  odoo:
    # Default Odoo container image (overridable per Application). Each app's chart
    # comes from its ApplicationType (the catalog), not from here. The tag must be
    # a published one — the registry carries the floating 19.0 nightly, not latest.
    imageRepository: ghcr.io/adomi-io/odoo
    imageTag: "19.0"
  # Base domain for generated hostnames (<app>-<environment>-<client>.<baseDomain>,
  # a single label so a *.<baseDomain> wildcard cert/record covers it). Leave empty
  # to require an Organization with a base domain, or per-application spec.ingress.host.
  baseDomain: ""

  # Odoo management portal push. On every status change the controller POSTs the
  # resource to the portal's ingest endpoint so it reflects live state without
  # polling. Empty url disables the push. The bearer token is read from OpenBao at
  # secretPath/tokenKey and must match the portal's ADOMI_INGEST_TOKEN.
  odooNotify:
    url: ""  # e.g. http://adomi-platform-management.adomi-platform-management.svc.cluster.local:8069
    secretPath: adomi-ingest
    tokenKey: token

  # Build pipeline: when an Application declares a source, the controller
  # submits an Argo Workflow that builds the repo image (BuildKit) and pushes it to
  # Harbor, then deploys it.
  build:
    # Install the build WorkflowTemplate + build ServiceAccount/RBAC into the argo
    # namespace. Disable if you provide your own build infrastructure.
    enabled: true
    # Argo namespace the WorkflowTemplate, build ServiceAccount, and Workflows live in.
    argoNamespace: argo
    workflowTemplate: odoo-image-build
    serviceAccount: odoo-build
    # Rootless BuildKit image used by the build step.
    buildkitImage: moby/buildkit:v0.17.2-rootless
    harbor:
      # Registry host built images are pushed to. Empty falls back to harbor.<baseDomain>.
      host: ""
      # Harbor project/repository prefix for built images (harbor/<project>/<repo>:<tag>).
      project: previews
      # Push credentials: username + the OpenBao KV path/key holding the password.
      username: admin
      secretPath: harbor-app
      secretKey: admin-password
      # Registry endpoint builds PUSH through, e.g. http://harbor-core.harbor.svc —
      # in-cluster builds should reach the registry over the cluster's own service
      # DNS like every other in-cluster call (the public host may sit behind a CDN
      # proxy that caps upload bodies; Cloudflare 413s image layers). Images are
      # still deployed under the public host above — a registry serves the same
      # content under any of its names. http:// marks it insecure for BuildKit.
      # Empty pushes via the public host.
      pushEndpoint: ""
    # GitHub App used to clone private github.com repositories: the controller
    # mints a short-lived installation token per build (scoped to that one repo,
    # contents:read — nothing durable is ever stored). Seed the OpenBao path once
    # with the App's identity, e.g.
    #   bao kv put secret/github-app app-id=123456 private-key=@app.private-key.pem
    # A missing path disables App auth; an explicit spec.credentialsSecretRef on
    # the GitRepository always wins. Empty secretPath turns the feature off.
    githubApp:
      secretPath: github-app
      appIdKey: app-id
      privateKeyKey: private-key

  # Preview environments: when a GitRepository enables previews, the controller
  # generates a github EventSource + Sensor + webhook Ingress so pull requests
  # create/rebuild/destroy preview Environments + Applications automatically.
  preview:
    # Install the preview Sensor ServiceAccount + RBAC. Disable to turn the feature
    # off cluster-wide (GitRepository preview.enabled is then inert).
    enabled: true
    # Public webhook host GitHub posts to. Empty falls back to hooks.<baseDomain>.
    webhookHost: ""
    # cert-manager ClusterIssuer + IngressClass for the webhook Ingress.
    clusterIssuer: letsencrypt-prod
    ingressClassName: traefik
    # ServiceAccount the generated Sensors run as (in the argo namespace).
    sensorServiceAccount: odoo-previews
    # GitHub API base URL (override for GitHub Enterprise).
    githubApiUrl: https://api.github.com

  # Database snapshots: dump an Application's Postgres DB to object storage, and
  # restore/clone (optionally sanitized via Odoo neutralize) into another env.
  snapshots:
    # Install the snapshot/restore WorkflowTemplates into the argo namespace.
    enabled: true
    argoNamespace: argo
    snapshotWorkflowTemplate: odoo-db-snapshot
    restoreWorkflowTemplate: odoo-db-restore
    # Shared workspace PVC size for the dump/restore jobs.
    workspaceSize: 5Gi
    s3:
      # Object store the dumps live in. Credentials come from OpenBao (secretPath).
      endpoint: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333
      bucket: platform
      secretPath: s3
    images:
      postgres: postgres:16
      awscli: amazon/aws-cli:2

# Install the CRDs with the chart. Helm only installs CRDs from crds/ on first
# install (it never upgrades or deletes them); set to false to manage them out
# of band.
installCRDs: true
