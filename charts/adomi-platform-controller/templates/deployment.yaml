apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adomi-platform-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adomi-platform-controller.labels" . | nindent 4 }}
spec:
  # The operator runs standalone (no peering); a single replica owns
  # reconciliation. Increase only if you also enable Kopf peering.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "adomi-platform-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "adomi-platform-controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "adomi-platform-controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "adomi-platform-controller.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The image's ENTRYPOINT runs `kopf run` (see Dockerfile). All backend
          # wiring is passed via environment variables.
          env:
            # OpenBao.
            - name: OPENBAO_ADDR
              value: {{ .Values.backend.openbao.address | quote }}
            - name: OPENBAO_KV_MOUNT
              value: {{ .Values.backend.openbao.kvMount | quote }}
            - name: OPENBAO_AUTH_MODE
              value: {{ .Values.backend.openbao.authMode | quote }}
            {{- if eq .Values.backend.openbao.authMode "token" }}
            - name: OPENBAO_TOKEN_SECRET_NAMESPACE
              value: {{ .Values.backend.openbao.token.secretNamespace | quote }}
            - name: OPENBAO_TOKEN_SECRET_NAME
              value: {{ .Values.backend.openbao.token.secretName | quote }}
            - name: OPENBAO_TOKEN_SECRET_KEY
              value: {{ .Values.backend.openbao.token.secretKey | quote }}
            {{- else }}
            - name: OPENBAO_KUBERNETES_AUTH_MOUNT
              value: {{ .Values.backend.openbao.kubernetes.authMount | quote }}
            - name: OPENBAO_KUBERNETES_AUTH_ROLE
              value: {{ .Values.backend.openbao.kubernetes.authRole | quote }}
            {{- end }}
            # Authentik.
            - name: AUTHENTIK_ADDR
              value: {{ .Values.backend.authentik.address | quote }}
            - name: AUTHENTIK_SECRET_PATH
              value: {{ .Values.backend.authentik.secretPath | quote }}
            - name: AUTHENTIK_TOKEN_KEY
              value: {{ .Values.backend.authentik.tokenKey | quote }}
            - name: AUTHENTIK_AUTHORIZATION_FLOW
              value: {{ .Values.backend.authentik.authorizationFlowSlug | quote }}
            - name: AUTHENTIK_INVALIDATION_FLOW
              value: {{ .Values.backend.authentik.invalidationFlowSlug | quote }}
            - name: AUTHENTIK_SIGNING_KEY_NAME
              value: {{ .Values.backend.authentik.signingKeyName | quote }}
            # External Secrets.
            - name: CLUSTER_SECRET_STORE
              value: {{ .Values.backend.externalSecrets.clusterSecretStore | quote }}
            # Platform / Argo CD / Odoo chart wiring.
            - name: ARGOCD_NAMESPACE
              value: {{ .Values.platform.argocd.namespace | quote }}
            - name: ARGOCD_PROJECT
              value: {{ .Values.platform.argocd.project | quote }}
            - name: ODOO_IMAGE_REPOSITORY
              value: {{ .Values.platform.odoo.imageRepository | quote }}
            - name: ODOO_IMAGE_TAG
              value: {{ .Values.platform.odoo.imageTag | quote }}
            - name: PLATFORM_BASE_DOMAIN
              value: {{ .Values.platform.baseDomain | quote }}
            # Odoo management portal push (status changes -> portal ingest endpoint).
            - name: ODOO_NOTIFY_URL
              value: {{ .Values.platform.odooNotify.url | quote }}
            - name: ODOO_NOTIFY_SECRET_PATH
              value: {{ .Values.platform.odooNotify.secretPath | quote }}
            - name: ODOO_NOTIFY_TOKEN_KEY
              value: {{ .Values.platform.odooNotify.tokenKey | quote }}
            # Build pipeline (Argo Workflows + Harbor).
            - name: ARGO_NAMESPACE
              value: {{ .Values.platform.build.argoNamespace | quote }}
            - name: BUILD_WORKFLOW_TEMPLATE
              value: {{ .Values.platform.build.workflowTemplate | quote }}
            - name: BUILD_SERVICE_ACCOUNT
              value: {{ .Values.platform.build.serviceAccount | quote }}
            - name: HARBOR_HOST
              value: {{ .Values.platform.build.harbor.host | quote }}
            - name: HARBOR_PROJECT
              value: {{ .Values.platform.build.harbor.project | quote }}
            - name: HARBOR_USERNAME
              value: {{ .Values.platform.build.harbor.username | quote }}
            - name: HARBOR_SECRET_PATH
              value: {{ .Values.platform.build.harbor.secretPath | quote }}
            - name: HARBOR_SECRET_KEY
              value: {{ .Values.platform.build.harbor.secretKey | quote }}
            - name: HARBOR_PUSH_ENDPOINT
              value: {{ .Values.platform.build.harbor.pushEndpoint | quote }}
            - name: HARBOR_PULL_SECRET_PATH
              value: {{ .Values.platform.build.harbor.pullSecretPath | quote }}
            # GitHub App auth for private-repo builds (OpenBao path + key names).
            - name: GITHUB_APP_SECRET_PATH
              value: {{ .Values.platform.build.githubApp.secretPath | quote }}
            - name: GITHUB_APP_ID_KEY
              value: {{ .Values.platform.build.githubApp.appIdKey | quote }}
            - name: GITHUB_APP_PRIVATE_KEY_KEY
              value: {{ .Values.platform.build.githubApp.privateKeyKey | quote }}
            # Preview environments (Argo Events + webhook ingress + PR feedback).
            - name: WEBHOOK_HOST
              value: {{ .Values.platform.preview.webhookHost | quote }}
            - name: CLUSTER_ISSUER
              value: {{ .Values.platform.preview.clusterIssuer | quote }}
            - name: PREVIEW_INGRESS_CLASS
              value: {{ .Values.platform.preview.ingressClassName | quote }}
            - name: PREVIEW_SENSOR_SERVICE_ACCOUNT
              value: {{ .Values.platform.preview.sensorServiceAccount | quote }}
            - name: GITHUB_API_URL
              value: {{ .Values.platform.preview.githubApiUrl | quote }}
            # Database snapshots (object storage + workflow templates + images).
            - name: S3_ENDPOINT
              value: {{ .Values.platform.snapshots.s3.endpoint | quote }}
            - name: S3_BUCKET
              value: {{ .Values.platform.snapshots.s3.bucket | quote }}
            - name: S3_SECRET_PATH
              value: {{ .Values.platform.snapshots.s3.secretPath | quote }}
            - name: SNAPSHOT_WORKFLOW_TEMPLATE
              value: {{ .Values.platform.snapshots.snapshotWorkflowTemplate | quote }}
            - name: RESTORE_WORKFLOW_TEMPLATE
              value: {{ .Values.platform.snapshots.restoreWorkflowTemplate | quote }}
            - name: SNAPSHOT_POSTGRES_IMAGE
              value: {{ .Values.platform.snapshots.images.postgres | quote }}
            - name: SNAPSHOT_AWSCLI_IMAGE
              value: {{ .Values.platform.snapshots.images.awscli | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
