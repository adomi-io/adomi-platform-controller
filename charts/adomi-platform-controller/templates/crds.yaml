      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Application runs a catalog app (by type) in a Workspace via Argo CD.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Application
            properties:
              workspaceRef:
                description: workspaceRef names the owning Workspace (same namespace).
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              type:
                description: type is the ApplicationType (catalog entry) to deploy.
                minLength: 1
                type: string
              displayName:
                type: string
              replicas:
                default: 1
                format: int64
                minimum: 0
                type: integer
              values:
                description: values are free-form Helm value overrides (highest precedence).
                type: object
                x-kubernetes-preserve-unknown-fields: true
              databases:
                description: |-
                  databases declares the databases this app needs — explicit, nothing
                  inferred. Each entry emits a Database CR on its named (standalone)
                  DatabaseServer; the controller delivers the role password to
                  credentials.secret and the workload reads the connection from spec.env.
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    server:
                      description: The (standalone) DatabaseServer to create this database on.
                      minLength: 1
                      type: string
                    databaseName:
                      type: string
                    user:
                      type: string
                    credentials:
                      properties:
                        secret:
                          type: string
                        openbaoPath:
                          type: string
                        passwordKey:
                          type: string
                      type: object
                  required:
                  - name
                  - server
                  type: object
                type: array
              ingress:
                description: ingress overrides ingress settings for the app.
                properties:
                  host:
                    description: host overrides the generated <app>.<workspace>.<client>.<baseDomain>.
                    type: string
                  className:
                    type: string
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                  tls:
                    items:
                      x-kubernetes-preserve-unknown-fields: true
                    type: array
                type: object
              sso:
                description: |-
                  sso declares the SSO registrations this app needs. Each entry emits an
                  SSOApplication CR; credentials.secret receives the OIDC/proxy credentials.
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    protocol:
                      enum:
                      - oauth2
                      - proxy
                      type: string
                    redirectUris:
                      items:
                        type: string
                      type: array
                    credentials:
                      properties:
                        secret:
                          type: string
                      type: object
                  required:
                  - name
                  type: object
                type: array
              env:
                description: |-
                  env is the explicit environment for the workload — the connection
                  wiring (DB host, secretKeyRef to a delivered credential Secret, admin
                  password, etc.). Nothing is inferred; passed to the chart verbatim.
                items:
                  x-kubernetes-preserve-unknown-fields: true
                type: array
              source:
                description: |-
                  source builds the app image from a GitRepository (type "odoo"); the
                  controller runs an Argo Workflow and gates deploy on a successful build.
                properties:
                  repositoryRef:
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  ref:
                    type: string
                  contextPath:
                    type: string
                  dockerfile:
                    type: string
                  baseImage:
                    type: string
                required:
                - repositoryRef
                type: object
              restoreFrom:
                description: |-
                  restoreFrom clones a Snapshot's database into this app before deploying
                  (cnpg only; type "odoo"). Gated and idempotent (status.restoredFrom).
                properties:
                  snapshotRef:
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  sanitize:
                    type: boolean
                required:
                - snapshotRef
                type: object
            required:
