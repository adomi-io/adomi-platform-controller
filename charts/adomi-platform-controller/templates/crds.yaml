            properties:
              namespace:
                type: string
              url:
                type: string
              phase:
                description: phase is the lifecycle phase (Building, Restoring, Deployed, *Failed).
                type: string
              argoApplication:
                type: string
              builtImage:
                type: string
              buildWorkflow:
                type: string
              restoredFrom:
                type: string
              restoreWorkflow:
                type: string
              ssoSlug:
                type: string
              connection:
                description: |-
                  connection is the contract this app publishes for integrations
                  (url / db / smtp / oidc, per the type's "provides").
                type: object
                x-kubernetes-preserve-unknown-fields: true
              conditions:
                description: |-
                  conditions represent the current state of the resource.
                  Known types: "Ready".
                items:
                  description: Condition contains details for one aspect of the current
