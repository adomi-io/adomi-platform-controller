{{- $fullname := include "adomi-platform-controller.fullname" . -}}
{{- $sa := include "adomi-platform-controller.serviceAccountName" . -}}
# ClusterRole: the CRDs the controller reconciles, plus the supporting resources
# it manages on their behalf (ExternalSecrets, SSOApplications, Argo CD
# Applications, CloudNativePG Clusters, per-environment namespaces), plus Events.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $fullname }}-manager
  labels:
    {{- include "adomi-platform-controller.labels" . | nindent 4 }}
rules:
  # Kopf watches CRDs and namespaces cluster-wide at startup to discover which
  # resources exist and which namespaces to operate in (run with -A). Without
  # these it cannot establish its watches and reconciliation never starts.
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  # The controller creates per-workspace namespaces and the supporting resources, and prunes them on
  # teardown (which cascades that environment's database / SSO / ExternalSecret).
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [create, get, list, patch, update, watch, delete]
  # Kopf posts Kubernetes Events about handler outcomes.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [external-secrets.io]
    resources: [externalsecrets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [identity.adomi.io]
    resources: [ssoapplications]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [identity.adomi.io]
    resources: [ssoapplications/status]
    verbs: [get, patch, update]
  - apiGroups: [identity.adomi.io]
    resources: [ssoapplications/finalizers]
    verbs: [update]
  # Platform CRDs reconciled by this controller.
  - apiGroups: [platform.adomi.io]
    resources: [organizations, clients, workspaces, applications, applicationtypes, gitrepositories, snapshots, databaseservers, databases, domains]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [platform.adomi.io]
    resources: [organizations/status, clients/status, workspaces/status, applications/status, applicationtypes/status, gitrepositories/status, snapshots/status, databaseservers/status, databases/status, domains/status]
    verbs: [get, patch, update]
  - apiGroups: [platform.adomi.io]
    resources: [organizations/finalizers, clients/finalizers, workspaces/finalizers, applications/finalizers, applicationtypes/finalizers, gitrepositories/finalizers, snapshots/finalizers, databaseservers/finalizers, databases/finalizers, domains/finalizers]
    verbs: [update]
  # Argo CD Applications: the controller creates one per Application to deploy its
  # chart, and deletes it on teardown.
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [create, delete, get, list, patch, update, watch]
  # Argo Workflows: the controller submits image-build Workflows (from the shipped
  # WorkflowTemplate) and watches them to completion.
  - apiGroups: [argoproj.io]
    resources: [workflows]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [argoproj.io]
    resources: [workflowtemplates]
    verbs: [get, list, watch]
  # Argo Events: the controller generates a github EventSource + Sensor per
  # preview-enabled GitRepository and tears them down with it.
  - apiGroups: [argoproj.io]
    resources: [eventsources, sensors]
    verbs: [create, delete, get, list, patch, update, watch]
  # Ingresses: the controller exposes each preview EventSource webhook publicly.
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [create, delete, get, list, patch, update, watch]
  # CloudNativePG Clusters: provisioned for in-cluster (cnpg-mode) DatabaseServers.
  - apiGroups: [postgresql.cnpg.io]
    resources: [clusters]
    verbs: [create, delete, get, list, patch, update, watch]
  # Jobs: the database provisioner runs a one-shot Job (psql) per Database to create
  # the database + role on its server.
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [create, delete, get, list, patch, update, watch]
  # Secrets: read referenced git credentials, and create the Harbor push /
  # git-token Secrets the build Workflow consumes in the argo namespace.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, get, list, patch, update]
  # ConfigMaps: deliver the database provisioning SQL as a mounted file the psql Job
  # runs with -f, so no shell ever interpolates the SQL content.
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, delete, get, list, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $fullname }}-manager
  labels:
    {{- include "adomi-platform-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $fullname }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
{{- if eq .Values.backend.openbao.authMode "token" }}
---
# Token mode: read just the OpenBao token Secret in its namespace (least
# privilege -- the controller never lists Secrets cluster-wide).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-openbao-token
  namespace: {{ .Values.backend.openbao.token.secretNamespace }}
  labels:
    {{- include "adomi-platform-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [{{ .Values.backend.openbao.token.secretName | quote }}]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-openbao-token
  namespace: {{ .Values.backend.openbao.token.secretNamespace }}
  labels:
    {{- include "adomi-platform-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-openbao-token
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
{{- end }}
