apiVersion: v2
name: adomi-platform-management
description: |
  Versioning anchor for the Adomi platform management portal image
  (ghcr.io/adomi-io/adomi-platform-management). The portal source lives in
  this monorepo under src/adomi_platform_management (an Odoo project with the
  adomi_platform addon). CI tags the image from this chart's appVersion.

  The portal is DEPLOYED by the platform itself: the kubernetes-provisioner renders
  an Argo CD Application that installs it via the adomi-helm odoo chart, backed by
  our own resources — a CloudNativePG database, OpenBao-delivered secrets, an
  Authentik SSOApplication, and the platform API as the git write-backend.
type: application
# Chart version tracks this packaging; appVersion is the management image tag.
version: 0.2.0
appVersion: "0.2.0"
home: https://github.com/adomi-io/adomi-platform-controller
maintainers:
  - name: Adomi Software
