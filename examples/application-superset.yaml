# A Superset Application with native OIDC (oauth2) SSO and its own database. To use
# Odoo's database as a Superset data source, point Superset's env at Odoo's database
# Secret + host explicitly (a capability reference) — no runtime matchmaking.
apiVersion: platform.adomi.io/v1alpha1
kind: Application
metadata:
  name: superset
  namespace: adomi-system
spec:
  workspaceRef:
    name: production
  type: superset
  databases:
    - name: main
      server: acme-prod-db
      credentials:
        secret: superset-main-db
  sso:
    - name: web
      protocol: oauth2
      credentials:
        secret: superset-oidc
  env:
    - name: DB_HOST
      value: main-rw.acme-production.svc.cluster.local
    - name: DB_PASS
      valueFrom:
        secretKeyRef:
          name: superset-main-db
          key: password
