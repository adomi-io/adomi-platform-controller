# A Superset Application with native OIDC (oauth2) SSO and its own CloudNativePG
# metadata database. The integration registers the Odoo Application's database as a
# Superset data source: when the Odoo app is Ready and publishes its connection
# contract, the controller injects the Odoo DB coordinates into Superset.
apiVersion: platform.adomi.io/v1alpha1
kind: Application
metadata:
  name: superset
  namespace: adomi-system
spec:
  workspaceRef:
    name: production
  type: superset
  database:
    mode: cnpg
    cnpg:
      storage: 10Gi
  sso:
    enabled: true
  integrations:
    - type: odoo-superset-datasource
      fromRef:
        name: odoo        # the provider Application (must be Ready first)
