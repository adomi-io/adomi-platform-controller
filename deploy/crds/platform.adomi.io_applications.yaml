---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: applications.platform.adomi.io
spec:
  group: platform.adomi.io
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    shortNames:
    - app
    singular: application
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.url
      name: URL
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Application runs a catalog app (by type) in a Environment via Argo CD.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Application
            properties:
              environmentRef:
                description: environmentRef names the owning Environment (same namespace).
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              type:
                description: type is the ApplicationType (catalog entry) to deploy.
                minLength: 1
                type: string
              displayName:
                type: string
              replicas:
                default: 1
                format: int64
                minimum: 0
                type: integer
              values:
                description: values are free-form Helm value overrides (highest precedence).
                type: object
                x-kubernetes-preserve-unknown-fields: true
              databases:
                description: |-
                  databases declares the databases this app needs — explicit, nothing
                  inferred. Each entry emits a Database CR on its named (standalone)
                  DatabaseServer; the controller delivers the role password to
                  credentials.secret and the workload reads the connection from spec.env.
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    server:
                      description: The (standalone) DatabaseServer to create this database on.
                      minLength: 1
                      type: string
                    databaseName:
                      type: string
                    user:
                      type: string
                    credentials:
                      properties:
                        secret:
                          type: string
                        openbaoPath:
                          type: string
                        passwordKey:
                          type: string
                      type: object
                  required:
                  - name
                  - server
                  type: object
                type: array
              ingress:
                description: ingress overrides ingress settings for the app.
                properties:
                  host:
                    description: host overrides the generated <app>.<environment>.<client>.<baseDomain>.
                    type: string
                  className:
                    type: string
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                  tls:
                    items:
                      x-kubernetes-preserve-unknown-fields: true
                    type: array
                type: object
              sso:
                description: |-
                  sso declares the SSO registrations this app needs. Each entry emits an
                  SSOApplication CR; credentials.secret receives the OIDC/proxy credentials.
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    protocol:
                      enum:
                      - oauth2
                      - proxy
                      type: string
                    redirectUris:
                      items:
                        type: string
                      type: array
                    credentials:
                      properties:
                        secret:
                          type: string
                      type: object
                  required:
                  - name
                  type: object
                type: array
              env:
                description: |-
                  env is the explicit environment for the workload — the connection
                  wiring (DB host, secretKeyRef to a delivered credential Secret, admin
                  password, etc.). Nothing is inferred; passed to the chart verbatim.
                items:
                  x-kubernetes-preserve-unknown-fields: true
                type: array
              variables:
                description: |-
                  variables are plain (non-secret) environment values contributed to
                  every workload in this scope; nearer scopes override (organization <
                  client < environment < application). Secret VALUES never appear in
                  git - they live in OpenBao via the platform API.
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    value:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              source:
                description: |-
                  source builds the app image from a GitRepository (type "odoo"); the
                  controller runs an Argo Workflow and gates deploy on a successful build.
                properties:
                  repositoryRef:
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  ref:
                    type: string
                  contextPath:
                    type: string
                  dockerfile:
                    type: string
                  baseImage:
                    type: string
                required:
                - repositoryRef
                type: object
              restoreFrom:
                description: |-
                  restoreFrom clones a Snapshot's database into this app before deploying
                  (cnpg only; type "odoo"). Gated and idempotent (status.restoredFrom).
                properties:
                  snapshotRef:
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  sanitize:
                    type: boolean
                required:
                - snapshotRef
                type: object
            required:
            - environmentRef
            - type
            type: object
          status:
            description: status defines the observed state of Application
            properties:
              namespace:
                type: string
              url:
                type: string
              phase:
                description: phase is the lifecycle phase (Building, Restoring, Deployed, *Failed).
                type: string
              argoApplication:
                type: string
              builtImage:
                type: string
              buildWorkflow:
                type: string
              restoredFrom:
                type: string
              restoreWorkflow:
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the resource.
                  Known types: "Ready".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
