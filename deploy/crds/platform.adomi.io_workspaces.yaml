---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workspaces.platform.adomi.io
spec:
  group: platform.adomi.io
  names:
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    shortNames:
    - ws
    singular: workspace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.class
      name: Class
      type: string
    - jsonPath: .status.namespace
      name: Namespace
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workspace is a named environment for a Client that groups Applications.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Workspace
            properties:
              clientRef:
                description: clientRef names the owning Client (same namespace).
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              class:
                default: development
                description: |-
                  class is the workspace class; it defaults policies such as the
                  database mode and sanitize-on-restore for Applications within it.
                enum:
                - preview
                - development
                - pdi
                - production
                - test
                type: string
              displayName:
                description: displayName is a human-readable name for the workspace.
                type: string
            required:
            - clientRef
            type: object
          status:
            description: status defines the observed state of Workspace
            properties:
              namespace:
                description: namespace is the per-workspace namespace Applications run in.
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the resource.
                  Known types: "Ready".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
