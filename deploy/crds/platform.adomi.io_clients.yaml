---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clients.platform.adomi.io
spec:
  group: platform.adomi.io
  names:
    kind: Client
    listKind: ClientList
    plural: clients
    singular: client
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.slug
      name: Slug
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Client is an end customer that owns Odoo projects and environments.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Client
            properties:
              slug:
                description: |-
                  slug is the stable identifier for the client, used in generated
                  namespaces and hostnames. Defaults to the resource name.
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              displayName:
                description: displayName is a human-readable name for the client.
                type: string
              variables:
                description: |-
                  variables are plain (non-secret) environment values contributed to
                  every workload in this scope; nearer scopes override (organization <
                  client < environment < application). Secret VALUES never appear in
                  git - they live in OpenBao via the platform API.
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    value:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              organizationRef:
                description: |-
                  organizationRef names the Organization whose defaults this client
                  inherits. Optional; when omitted the single Organization (if any) is
                  used, otherwise controller defaults apply.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            type: object
          status:
            description: status defines the observed state of Client
            properties:
              slug:
                description: slug is the resolved client slug.
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the resource.
                  Known types: "Ready".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
