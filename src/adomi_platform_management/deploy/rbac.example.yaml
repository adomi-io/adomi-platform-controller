# Example RBAC for running this Odoo in-cluster as the platform management portal.
# Bind the ServiceAccount the Odoo pod runs as to a ClusterRole that can manage the
# platform.adomi.io resources. (When running out-of-cluster, a mounted kubeconfig is
# used instead and this is not needed.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adomi-platform-management
  namespace: adomi-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: adomi-platform-management
rules:
  - apiGroups: [platform.adomi.io]
    resources:
      - organizations
      - clients
      - workspaces
      - applications
      - applicationtypes
      - gitrepositories
      - snapshots
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: adomi-platform-management
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: adomi-platform-management
subjects:
  - kind: ServiceAccount
    name: adomi-platform-management
    namespace: adomi-system
